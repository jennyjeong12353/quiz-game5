<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사쿠라 일본어 퀴즈</title>
    <style>
        :root {
            --bg-color: #fff5f7; /* 연한 핑크빛 배경 */
            --primary-color: #ffb7c5; /* 벚꽃 핑크 */
            --secondary-color: #ff8fa3; /* 진한 핑크 */
            --accent-color: #98bae7;
            --correct-color: #b8e0c5;
            --wrong-color: #ffb3b3;
            --text-color: #5d5d5d;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* 벚꽃 잎이 화면 밖으로 나가는 것 방지 */
        }

        /* 벚꽃 애니메이션 컨테이너 */
        #sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .petal {
            position: absolute;
            background-color: #ffc0cb;
            border-radius: 150% 0 150% 0;
            opacity: 0.8;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); }
            100% { transform: translateY(110vh) translateX(100px) rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem 2rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 183, 197, 0.2);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .hidden { display: none; }

        h1 { color: var(--secondary-color); margin-bottom: 1rem; font-size: 1.8rem; }

        /* UI Elements */
        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        #progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            width: 0%;
            transition: width 0.3s;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--secondary-color);
        }

        /* Quiz Area */
        .question-card {
            font-size: 2.2rem;
            margin: 1.5rem 0;
            padding: 1.5rem;
            background: #fff;
            border: 2px dashed var(--primary-color);
            border-radius: 20px;
            color: #333;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            padding: 14px;
            border: 1.5px solid var(--primary-color);
            background: white;
            color: var(--text-color);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.05rem;
            font-weight: 500;
        }

        .option-btn:hover {
            background: var(--bg-color);
            transform: translateY(-2px);
        }
        
        .option-btn.correct { background-color: var(--correct-color) !important; border-color: #8ec3a1; color: white; }
        .option-btn.wrong { background-color: var(--wrong-color) !important; border-color: #e09292; color: white; }

        /* Buttons */
        .main-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 143, 163, 0.4);
            transition: transform 0.2s;
        }

        .main-btn:hover { transform: scale(1.05); }

        input {
            padding: 12px;
            width: 85%;
            border: 2px solid var(--primary-color);
            border-radius: 15px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1rem;
        }

        /* Ranking & Notes */
        .ranking-list, .wrong-notes {
            text-align: left;
            margin-top: 1.5rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ffeef1;
        }
        .wrong-item {
            margin-bottom: 10px;
            padding: 10px;
            background: #fffafa;
            border-left: 4px solid var(--primary-color);
            border-radius: 5px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div id="sakura-container"></div>

    <div class="container">
        <!-- 1. 시작 화면 -->
        <div id="screen-start">
            <h1>🌸 사쿠라 퀴즈</h1>
            <p style="margin-bottom: 2rem;">일본어 단어 10문제를 맞히고<br>랭킹에 이름을 올려보세요!</p>
            <button class="main-btn" onclick="game.start()">퀴즈 시작하기</button>
        </div>

        <!-- 2. 퀴즈 화면 -->
        <div id="screen-quiz" class="hidden">
            <div class="progress-bar"><div id="progress"></div></div>
            <div class="stats">
                <span id="current-step">1/10</span>
                <span id="current-score">0점</span>
            </div>
            <div class="question-card" id="question-text">단어</div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <!-- 3. 결과 화면 -->
        <div id="screen-result" class="hidden">
            <h2 style="color:var(--secondary-color)">참 잘했어요!</h2>
            <h1 id="final-score" style="font-size: 3rem; margin: 0.5rem 0;">0점</h1>
            <input type="text" id="nickname" placeholder="닉네임 입력" maxlength="8">
            <button class="main-btn" id="save-btn">점수 저장 & 랭킹</button>
            
            <div id="wrong-answer-area">
                <h3 style="margin-top:2rem; border-bottom: 2px solid var(--bg-color); padding-bottom: 5px;">오답 노트</h3>
                <div class="wrong-notes" id="wrong-notes-list"></div>
            </div>
        </div>

        <!-- 4. 랭킹 화면 -->
        <div id="screen-ranking" class="hidden">
            <h2 style="color:var(--secondary-color)">명예의 전당 🌸</h2>
            <div class="ranking-list" id="ranking-container"></div>
            <button class="main-btn" onclick="location.reload()" style="margin-top:1.5rem">다시 도전</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // Firebase 설정 (전달해주신 키 적용)
        const firebaseConfig = {
            apiKey: "AIzaSyBgc87EwYMvYU0g1UHnM33E9X6PnWwI-Bs",
            authDomain: "my-quiz-game-8c884.firebaseapp.com",
            projectId: "my-quiz-game-8c884",
            storageBucket: "my-quiz-game-8c884.firebasestorage.app",
            messagingSenderId: "748069278338",
            appId: "1:748069278338:web:410bee8185c8311013da9b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 벚꽃 생성 로직
        function createPetals() {
            const container = document.getElementById('sakura-container');
            for (let i = 0; i < 30; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                const size = Math.random() * 10 + 10 + 'px';
                petal.style.width = size;
                petal.style.height = size;
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = Math.random() * 3 + 4 + 's';
                petal.style.delay = Math.random() * 5 + 's';
                petal.style.opacity = Math.random();
                container.appendChild(petal);
            }
        }
        createPetals();

        const quizData = [
            { q: "さくら", a: "벚꽃", o: ["장미", "벚꽃", "해바라기", "튤립", "매화"] },
            { q: "ねこ", a: "고양이", o: ["강아지", "고양이", "토끼", "햄스터", "여우"] },
            { q: "ともだち", a: "친구", o: ["가족", "선생님", "친구", "동생", "언니"] },
            { q: "そら", a: "하늘", o: ["바다", "구름", "하늘", "바람", "태양"] },
            { q: "すき", a: "좋아함", o: ["싫어함", "좋아함", "무서움", "기쁨", "슬픔"] },
            { q: "くるま", a: "자동차", o: ["자전거", "비행기", "자동차", "배", "기차"] },
            { q: "あめ", a: "비", o: ["눈", "비", "구름", "안개", "번개"] },
            { q: "うみ", a: "바다", o: ["강", "산", "바다", "호수", "계곡"] },
            { q: "つき", a: "달", o: ["별", "해", "달", "지구", "우주"] },
            { q: "ゆめ", a: "꿈", o: ["사랑", "꿈", "희망", "미래", "과거"] }
        ];

        let currentIdx = 0;
        let score = 0;
        let wrongAnswers = [];
        let isProcessing = false;

        window.game = {
            start: function() {
                document.getElementById('screen-start').classList.add('hidden');
                document.getElementById('screen-quiz').classList.remove('hidden');
                this.showQuestion();
            },

            showQuestion: function() {
                const data = quizData[currentIdx];
                document.getElementById('current-step').innerText = `${currentIdx + 1}/10`;
                document.getElementById('current-score').innerText = `${score}점`;
                document.getElementById('progress').style.width = `${((currentIdx + 1) / 10) * 100}%`;
                document.getElementById('question-text').innerText = data.q;

                const container = document.getElementById('options-container');
                container.innerHTML = '';
                
                data.o.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => this.checkAnswer(opt, btn);
                    container.appendChild(btn);
                });
            },

            checkAnswer: function(choice, btn) {
                if (isProcessing) return;
                isProcessing = true;

                const correct = quizData[currentIdx].a;
                const buttons = document.querySelectorAll('.option-btn');

                if (choice === correct) {
                    score += 10;
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    wrongAnswers.push({ q: quizData[currentIdx].q, a: correct });
                    buttons.forEach(b => {
                        if (b.innerText === correct) b.classList.add('correct');
                    });
                }

                setTimeout(() => {
                    currentIdx++;
                    isProcessing = false;
                    if (currentIdx < quizData.length) {
                        this.showQuestion();
                    } else {
                        this.showResult();
                    }
                }, 800);
            },

            showResult: function() {
                document.getElementById('screen-quiz').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');
                document.getElementById('final-score').innerText = `${score}점`;

                const wrongList = document.getElementById('wrong-notes-list');
                wrongList.innerHTML = '';
                if (wrongAnswers.length === 0) {
                    wrongList.innerHTML = '<p style="text-align:center">🌸 만점입니다! 완벽해요! 🌸</p>';
                } else {
                    wrongAnswers.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'wrong-item';
                        div.innerHTML = `<strong>${item.q}</strong> <span style="color:var(--secondary-color)">→</span> ${item.a}`;
                        wrongList.appendChild(div);
                    });
                }
            }
        };

        document.getElementById('save-btn').onclick = async () => {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return alert("닉네임을 입력해주세요!");

            try {
                await addDoc(collection(db, "scores"), {
                    nickname: nickname,
                    score: score,
                    timestamp: serverTimestamp()
                });

                const q = query(collection(db, "scores"), orderBy("score", "desc"), orderBy("timestamp", "asc"), limit(5));
                const querySnapshot = await getDocs(q);
                
                const rankingContainer = document.getElementById('ranking-container');
                rankingContainer.innerHTML = '';
                
                let rank = 1;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = 'ranking-item';
                    item.innerHTML = `<span>${rank++}. ${data.nickname}</span> <strong>${data.score}점</strong>`;
                    rankingContainer.appendChild(item);
                });

                document.getElementById('screen-result').classList.add('hidden');
                document.getElementById('screen-ranking').classList.remove('hidden');

            } catch (e) {
                console.error(e);
                alert("저장에 실패했습니다. 콘솔을 확인하세요.");
            }
        };
    </script>
</body>
</html>
